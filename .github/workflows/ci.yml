name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run lint

      - run: bun run test:run

      - run: bun run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-for-build
          AZURE_OPENAI_API_KEY: placeholder-for-build
          AZURE_OPENAI_ENDPOINT: https://placeholder.openai.azure.com
          AZURE_OPENAI_EMBEDDING_DEPLOYMENT: text-embedding-3-small
          GROQ_API_KEY: placeholder-for-build
          GOOGLE_GENERATIVE_AI_API_KEY: placeholder-for-build

  e2e:
    runs-on: ubuntu-latest
    needs: test
    env:
      E2E_TESTING: 'true'
      MOCK_EXTERNAL_APIS: '1'
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AZURE_OPENAI_API_KEY: placeholder-for-build
      AZURE_OPENAI_ENDPOINT: https://placeholder.openai.azure.com
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: text-embedding-3-small
      GROQ_API_KEY: placeholder-for-build
      GOOGLE_GENERATIVE_AI_API_KEY: placeholder-for-build
      TEST_USER_EMAIL: test@studium.local
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bunx playwright install --with-deps chromium

      - run: bun run build

      - run: bun run e2e
