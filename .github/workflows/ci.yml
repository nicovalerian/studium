name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint

      - run: npm run test:run

      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-for-build
          DO_GRADIENT_API_KEY: placeholder-for-build
          DO_GRADIENT_CHAT_MODEL: llama3.3-70b-instruct
          HUGGINGFACE_API_KEY: placeholder-for-build
          HUGGINGFACE_EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2

  e2e:
    runs-on: ubuntu-latest
    needs: test
    env:
      E2E_TESTING: 'true'
      MOCK_EXTERNAL_APIS: '1'
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DO_GRADIENT_API_KEY: placeholder-for-build
      DO_GRADIENT_CHAT_MODEL: llama3.3-70b-instruct
      HUGGINGFACE_API_KEY: placeholder-for-build
      HUGGINGFACE_EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      TEST_USER_EMAIL: test@studium.local
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run build

      - run: npm run e2e
